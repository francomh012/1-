<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Peshosa | 1 Año Juntos</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fdfbf7;
            --wine: #4a0404;
            --wine-light: #8b1a1a;
            --gold: #c5a059;
            --ink: #2d2d2d;
            --paper-shadow: rgba(0, 0, 0, 0.15);
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--cream);
            background-image: radial-gradient(circle at center, transparent 0%, rgba(74, 4, 4, 0.03) 100%);
            color: var(--wine);
            font-family: 'Playfair Display', serif;
            overflow: hidden; /* Evita scroll ya que es una sola pantalla */
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Tipografía y Textos */
        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 600;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeIn 1.2s var(--transition) forwards;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .subtitle {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.5rem, 4vw, 2rem);
            color: var(--wine-light);
            opacity: 0;
            animation: fadeIn 1.2s var(--transition) 0.5s forwards;
        }

        /* Elemento Diferenciador: La Carta Físicamente Interactiva */
        .letter-wrapper {
            perspective: 1200px;
            margin-top: 4rem;
            opacity: 0;
            animation: fadeInUp 1.2s var(--transition) 1s forwards;
        }

        .letter-container {
            cursor: pointer;
            width: clamp(280px, 80vw, 400px);
            height: 220px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s var(--transition);
        }

        .letter-container:hover {
            transform: translateY(-5px);
        }

        .envelope {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--wine) 0%, #3a0303 100%);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 15px 35px var(--paper-shadow);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            pointer-events: none;
        }

        .envelope.open {
            transform: rotateX(-180deg);
            box-shadow: 0 -15px 35px var(--paper-shadow);
        }

        .envelope-text {
            color: var(--gold);
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            letter-spacing: 2px;
            backface-visibility: hidden;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .letter-content {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fffdf9;
            backface-visibility: hidden;
            transform: rotateX(180deg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
            border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(197, 160, 89, 0.1);
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .letter-content p {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            color: var(--ink);
            text-align: center;
            line-height: 1.5;
        }

        /* Controles Música */
        .music-ctrl {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: transparent;
            color: var(--wine);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid var(--wine);
            cursor: pointer;
            z-index: 100;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--transition);
            backdrop-filter: blur(5px);
        }

        .music-ctrl:hover {
            background: var(--wine);
            color: var(--cream);
            transform: scale(1.1);
        }

        /* Partículas Ambientales (Corazones) */
        .particle {
            position: fixed;
            color: var(--wine-light);
            pointer-events: none;
            z-index: -1;
            opacity: 0;
            animation: floatUp var(--duration) var(--transition) forwards;
        }

        /* Keyframes */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            20% { opacity: 0.4; }
            80% { opacity: 0.2; }
            100% {
                transform: translateY(-20vh) scale(1.2) rotate(45deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- UI Principal -->
    <header style="text-align: center; z-index: 10;">
        <h1>Para mi Jessika</h1>
        <p class="subtitle">1 año a tu lado, mi Peshosa.</p>
    </header>

    <main class="letter-wrapper">
        <article
            class="letter-container"
            onclick="this.querySelector('.envelope').classList.toggle('open')"
            aria-label="Carta interactiva de aniversario"
        >
            <div class="envelope">
                <span class="envelope-text">Ábreme</span>

                <div class="letter-content">
                    <p>
                        Gracias por cada segundo, por tu paciencia y por este año increíble.<br>
                        <strong>Te amo.</strong>
                    </p>
                </div>
            </div>
        </article>
    </main>

    <button class="music-ctrl" onclick="toggleMusic()" aria-label="Reproducir música romántica">
        ♫
    </button>

    <script>
        // Sistema de Partículas (Corazones flotantes elegantes)
        function createParticle() {
            const particle = document.createElement('div');
            // Usamos un símbolo sutil en lugar de un emoji ruidoso
            particle.innerHTML = '♥';
            particle.className = 'particle';

            // Posición y tamaño aleatorios
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.fontSize = (Math.random() * 15 + 8) + 'px';

            // Duración de animación aleatoria para crear asimetría natural
            const duration = Math.random() * 4 + 4; // Entre 4s y 8s
            particle.style.setProperty('--duration', `${duration}s`);

            // Filtro de desenfoque para dar profundidad
            const blur = Math.random() * 3;
            particle.style.filter = `blur(${blur}px)`;

            document.body.appendChild(particle);

            // Limpieza del DOM
            setTimeout(() => particle.remove(), duration * 1000);
        }

        // Generar partículas continuamente
        setInterval(createParticle, 800);
        // Crear algunas partículas iniciales
        for(let i = 0; i < 5; i++) setTimeout(createParticle, i * 200);

        // Control de estado de música (Mock)
        let isPlaying = false;
        function toggleMusic() {
            const btn = document.querySelector('.music-ctrl');
            isPlaying = !isPlaying;

            if(isPlaying) {
                btn.innerHTML = '❚❚';
                btn.style.background = 'var(--wine)';
                btn.style.color = 'var(--cream)';
                // Aquí iría la lógica real: audio.play()
            } else {
                btn.innerHTML = '♫';
                btn.style.background = 'transparent';
                btn.style.color = 'var(--wine)';
                // Aquí iría la lógica real: audio.pause()
            }
        }
    </script>
</body>
</html>
